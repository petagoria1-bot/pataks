name: Build PATAKS.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install PyQt6 psutil pywin32 WMI pyinstaller Pillow

    - name: Build PATAKS.exe
      run: |
        pyinstaller pataks.spec --noconfirm --clean

    - name: Upload PATAKS.exe
      uses: actions/upload-artifact@v4
      with:
        name: PATAKS-Windows-exe
        path: dist/PATAKS.exe
        retention-days: 30
